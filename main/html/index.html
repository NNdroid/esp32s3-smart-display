<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Terminal 控制台</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container" id="login-view">
        <h2>✨ 終端機登入</h2>
        <div class="form-group">
            <label>使用者名稱</label>
            <input type="text" id="username" value="admin" disabled>
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="輸入密碼 (預設: admin)">
        </div>
        <button onclick="login()">登入控制台</button>
        <div id="login-msg" class="msg error"></div>
    </div>

    <div class="container hidden" id="config-view">
        <h2>🌐 狀態與設定</h2>

        <div class="status-bar">
            <div class="status-item"><span>IP 地址</span> <span class="status-value" id="val-ip">-</span></div>
            <div class="status-item"><span>Wi-Fi 訊號</span> <span class="status-value" id="val-rssi">-</span></div>
            <div class="status-item" id="item-temp"><span>內部溫度</span> <span class="status-value" id="val-temp">-</span></div>
            <div class="status-item" id="item-hum"><span>內部濕度</span> <span class="status-value" id="val-hum">-</span></div>
            <div class="status-item" id="item-press"><span>環境氣壓</span> <span class="status-value" id="val-press">-</span></div>
            <div class="status-item"><span>電池電量</span> <span class="status-value" id="val-battery">-</span></div>
        </div>
        <div class="card-panel">
            <div class="card-title">💡 顯示與電池設定</div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>螢幕亮度: <span id="brightness-val" style="color: #60a5fa; font-weight: bold;">100</span>%</label>
                <input type="range" id="brightness-slider" min="5" max="100" oninput="onBrightnessInput(this.value)">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>電池顯示設定</label>
                <div style="display: flex; gap: 10px;">
                    <select id="bat-style-select" onchange="updateBatteryConfig()" style="flex: 1;">
                        <option value="0">電池圖標</option>
                        <option value="1">數字電量</option>
                    </select>
                    <select id="bat-pos-select" onchange="updateBatteryConfig()" style="flex: 1;">
                        <option value="0">左上角</option>
                        <option value="1">右上角</option>
                        <option value="2">左下角</option>
                        <option value="3">右下角</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-panel">
            <div class="card-title">🌐 OpenWrt 流量表盤設定</div>
            <div class="form-group">
                <label>流量数据 JSON API 链接</label>
                <input type="text" id="openwrt-url" placeholder="留空使用默认: http://192.168.100.1/traffic.json">
            </div>
            <button onclick="updateOpenwrtUrl()">💾 保存 OpenWrt 配置</button>
            <div id="action-openwrt-msg" class="msg"></div>
        </div>

        <div class="card-panel">
            <div class="card-title">📡 MQTT 图像推送表盘设定 <span id="mqtt-status-badge" style="font-size: 12px; margin-left: 10px; padding: 2px 6px; border-radius: 4px; background: var(--surface-light); color: var(--text-muted);">状态: 未知</span></div>
            <div class="form-group">
                <label>Broker URL</label>
                <input type="text" id="mqtt-url" placeholder="留空则关闭 MQTT 图像接收功能">
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4;">
                    支持的协议格式例子：<br>
                    • TCP 直连: <b>mqtt://192.168.1.100:1883</b><br>
                    • WebSocket: <b>ws://192.168.1.100:80/mqtt</b><br>
                    <span style="color: var(--accent-emerald);">✅ 已挂载全球 CA 根证书，完美支持 mqtts:// 和 wss:// 加密连接</span>
                </div>
            </div>
            <div class="form-group">
                <label>订阅 Topic</label>
                <input type="text" id="mqtt-topic" placeholder="默认: smart-display/image">
            </div>
            <div class="form-group">
                <label>Username (留空表示无密码)</label>
                <input type="text" id="mqtt-user">
            </div>
            <div class="form-group">
                <label>Password (留空表示无密码)</label>
                <input type="password" id="mqtt-pwd">
            </div>
            <button onclick="updateMqttConfig()">💾 保存 MQTT 配置</button>
            <div id="action-mqtt-msg" class="msg"></div>
        </div>

        <div class="card-panel">
            <div class="card-title">🎮 遠端控制</div>
            <button onclick="triggerAction('/api/action/switch_face')" style="margin-bottom: 12px;">
                🔄 切換下一表盤
            </button>
            <button onclick="triggerAction('/api/action/switch_stock')" class="btn-slate" style="margin-bottom: 12px;">
                📈 切換下一股票
            </button>
            <button onclick="triggerAction('/api/action/restart')" class="btn-amber" style="margin-bottom: 12px;">
                🔌 重啟設備 (Reboot)
            </button>
            <button onclick="resetProvisioning()" class="btn-rose">
                ⚠️ 重新配网 (Reset Wi-Fi)
            </button>
        </div>

        <div class="card-panel">
            <div class="card-title">📈 股票設定</div>
            <div class="form-group">
                <label>股票顯示方式</label>
                <select id="chart-mode">
                    <option value="0">📈 1分鐘折線圖 (極速分时)</option>
                    <option value="1">📊 15分鐘蠟燭圖 (專業中線)</option>
                </select>
            </div>
            <div class="form-group">
                <label>股票代碼清單 (每行一個)</label>
                <textarea id="stock-list" rows="5" placeholder="例如:&#10;AAPL&#10;TSLA&#10;0700.HK"></textarea>
            </div>
            <button onclick="saveStocks()">💾 保存股票配置</button>
            <div id="action-stock-msg" class="msg"></div>
        </div>

        <div class="card-panel">
            <div class="card-title">⚙️ 系統管理</div>
            <div class="form-group">
                <label>固件升級 (OTA Update)</label>
                <input type="file" id="ota-file" accept=".bin" style="padding: 10px; background: rgba(0,0,0,0.15);">
                <button onclick="performOTA()" class="btn-purple" style="margin-top: 12px;">⚡ 開始固件升級</button>
                <div id="ota-progress-container" style="display: none; margin-top: 12px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                    <div id="ota-progress-bar" style="width: 0%; height: 16px; background: var(--accent-emerald); transition: width 0.2s;"></div>
                </div>
                <div id="ota-progress-text" style="font-size: 12px; margin-top: 4px; text-align: right; color: var(--text-muted); display: none;">0%</div>
            </div>
            <div class="form-group" style="margin-top: 24px;">
                <label>修改管理員密碼</label>
                <input type="password" id="old-pwd" placeholder="目前密碼" style="margin-bottom: 12px;">
                <input type="password" id="new-pwd" placeholder="新密碼" style="margin-bottom: 12px;">
                <button onclick="changePwd()" class="btn-slate">更新控制台密碼</button>
                <div id="action-pwd-msg" class="msg"></div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-msg"></p>
            <div class="modal-buttons">
                <button id="modal-btn-cancel" class="btn-cancel hidden">取消</button>
                <button id="modal-btn-ok" class="btn-ok">確定</button>
            </div>
        </div>
    </div>

    <script>
        const API_HEADERS = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        });

        // 初始化檢查
        window.onload = () => {
            document.getElementById('custom-modal').classList.add('hidden');
            if (localStorage.getItem('token')) {
                showView('config-view');
                loadData();
            } else {
                showView('login-view');
            }
        };

        // --- 自訂彈窗核心邏輯 ---
        function showCustomModal(msg, isConfirm) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('custom-modal');
                const msgEl = document.getElementById('modal-msg');
                const btnOk = document.getElementById('modal-btn-ok');
                const btnCancel = document.getElementById('modal-btn-cancel');

                msgEl.innerText = msg;
                overlay.classList.remove('hidden');

                if (isConfirm) {
                    btnCancel.classList.remove('hidden');
                } else {
                    btnCancel.classList.add('hidden');
                }

                const cleanup = (result) => {
                    overlay.classList.add('hidden');
                    btnOk.onclick = null;
                    btnCancel.onclick = null;
                    resolve(result);
                };

                btnOk.onclick = () => cleanup(true);
                btnCancel.onclick = () => cleanup(false);
            });
        }

        const customAlert = (msg) => showCustomModal(msg, false);
        const customConfirm = (msg) => showCustomModal(msg, true);

        function showView(id) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('config-view').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function showMsg(id, text, isError = false) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.style.color = isError ? 'var(--accent-rose)' : 'var(--accent-emerald)';
            setTimeout(() => el.innerText = '', 3000);
        }

        async function login() {
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    showView('config-view');
                    loadData();
                } else {
                    showMsg('login-msg', data.msg || '登入失敗', true);
                }
            } catch (e) {
                showMsg('login-msg', '設備連線失敗', true);
            }
        }

        async function loadData() {
            try {
                const resSettings = await fetch('/api/settings', { headers: API_HEADERS() });
                if (resSettings.ok) {
                    const settings = await resSettings.json();
                    const slider = document.getElementById('brightness-slider');
                    const label = document.getElementById('brightness-val');
                    slider.value = settings.brightness;
                    label.innerText = settings.brightness;
                    
                    if (settings.bat_style !== undefined) document.getElementById('bat-style-select').value = settings.bat_style;
                    if (settings.bat_pos !== undefined) document.getElementById('bat-pos-select').value = settings.bat_pos;
                    if (settings.openwrt_url !== undefined) document.getElementById('openwrt-url').value = settings.openwrt_url;
                    
                    if (settings.mqtt_url !== undefined) document.getElementById('mqtt-url').value = settings.mqtt_url;
                    if (settings.mqtt_topic !== undefined) document.getElementById('mqtt-topic').value = settings.mqtt_topic;
                    if (settings.mqtt_user !== undefined) document.getElementById('mqtt-user').value = settings.mqtt_user;
                }

                const resStatus = await fetch('/api/status', { headers: API_HEADERS() });
                if (resStatus.status === 401) {
                    showMsg('login-msg', '⚠️ 登入已過期或設備重啟，請重新登入', true);
                    showView('login-view');
                    return;
                }
                const status = await resStatus.json();
                document.getElementById('val-ip').innerText = `${status.ip} / ${status.ip6}`;
                document.getElementById('val-rssi').innerText = status.rssi;
                document.getElementById('val-battery').innerText = `${status.battery}% (${status.bat_mv}mV)`;
                
                if (status.has_sensor) {
                    document.getElementById('item-temp').style.display = 'flex';
                    document.getElementById('item-hum').style.display = 'flex';
                    document.getElementById('item-press').style.display = 'flex';
                    document.getElementById('val-temp').innerText = `${status.temp.toFixed(1)}°C`;
                    document.getElementById('val-hum').innerText = `${status.hum.toFixed(1)}%`;
                    document.getElementById('val-press').innerText = `${status.press.toFixed(1)}hPa`;
                } else {
                    document.getElementById('item-temp').style.display = 'none';
                    document.getElementById('item-hum').style.display = 'none';
                    document.getElementById('item-press').style.display = 'none';
                }

                const mqttBadge = document.getElementById('mqtt-status-badge');
                if (status.mqtt_connected) {
                    mqttBadge.innerText = '✅ 已连接';
                    mqttBadge.style.color = 'var(--accent-emerald)';
                } else {
                    mqttBadge.innerText = '❌ 未连接';
                    mqttBadge.style.color = 'var(--accent-rose)';
                }

                const resStocks = await fetch('/api/stocks', { headers: API_HEADERS() });
                const resStocksJson = await resStocks.json();
                document.getElementById('stock-list').value = resStocksJson.stocks.join('\n');
                document.getElementById('chart-mode').value = resStocksJson.chartMode ?? 0;
            } catch (e) {
                console.error("讀取數據失敗", e);
            }
        }
        
        async function fetchStatusOnly() {
            try {
                const resStatus = await fetch('/api/status', { headers: API_HEADERS() });
                if (resStatus.ok) {
                    const status = await resStatus.json();
                    document.getElementById('val-ip').innerText = `${status.ip} / ${status.ip6}`;
                    document.getElementById('val-rssi').innerText = status.rssi;
                    document.getElementById('val-battery').innerText = `${status.battery}% (${status.bat_mv}mV)`;
                    
                    if (status.has_sensor) {
                        document.getElementById('item-temp').style.display = 'flex';
                        document.getElementById('item-hum').style.display = 'flex';
                        document.getElementById('item-press').style.display = 'flex';
                        document.getElementById('val-temp').innerText = `${status.temp.toFixed(1)}°C`;
                        document.getElementById('val-hum').innerText = `${status.hum.toFixed(1)}%`;
                        document.getElementById('val-press').innerText = `${status.press.toFixed(1)}hPa`;
                    } else {
                        document.getElementById('item-temp').style.display = 'none';
                        document.getElementById('item-hum').style.display = 'none';
                        document.getElementById('item-press').style.display = 'none';
                    }
                    
                    const mqttBadge = document.getElementById('mqtt-status-badge');
                    if (status.mqtt_connected) {
                        mqttBadge.innerText = '✅ 已连接';
                        mqttBadge.style.color = 'var(--accent-emerald)';
                    } else {
                        mqttBadge.innerText = '❌ 未连接';
                        mqttBadge.style.color = 'var(--accent-rose)';
                    }
                }
            } catch (e) {
                console.error("Fetch status error");
            }
        }
        
        // 自动轮询状态 (每 5 秒一次)
        setInterval(() => {
            if (!document.getElementById('config-view').classList.contains('hidden')) {
                fetchStatusOnly();
            }
        }, 5000);

        async function saveStocks() {
            const lines = document.getElementById('stock-list').value.split('\n').map(s => s.trim()).filter(s => s);
            const chartMode = document.getElementById('chart-mode').value ?? 0;
            try {
                const res = await fetch('/api/stocks', {
                    method: 'POST',
                    headers: API_HEADERS(),
                    body: JSON.stringify({ stocks: lines, chartMode })
                });
                if (res.ok) showMsg('action-stock-msg', '✅ 股票清單已保存並觸發刷新');
                else if (res.status === 401) logout();
            } catch (e) {
                showMsg('action-stock-msg', '❌ 保存失敗', true);
            }
        }

        async function changePwd() {
            const old_password = document.getElementById('old-pwd').value;
            const new_password = document.getElementById('new-pwd').value;
            if (!old_password || !new_password) return showMsg('action-pwd-msg', '請輸入完整密碼', true);

            try {
                const res = await fetch('/api/password', {
                    method: 'POST',
                    headers: API_HEADERS(),
                    body: JSON.stringify({ old_password, new_password })
                });
                if (res.ok) {
                    customAlert('密碼修改成功，請重新登入！');
                    logout();
                } else {
                    const data = await res.json();
                    showMsg('action-pwd-msg', data.msg || '修改失敗', true);
                }
            } catch (e) {
                showMsg('action-pwd-msg', '❌ 修改失敗', true);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            document.getElementById('password').value = '';
            showView('login-view');
        }

        async function resetProvisioning() {
            if (!await customConfirm("確定要清除 Wi-Fi 設定並重新配網嗎？\n設備將會重啟並斷開當前連線！")) {
                return;
            }

            try {
                const res = await fetch('/api/reset_wifi', {
                    method: 'POST',
                    headers: API_HEADERS()
                });

                if (res.ok) {
                    customAlert("✅ 指令已發送！設備即將重啟進入配網模式。\n請查看設備螢幕獲取新的 PIN 碼。");
                } else {
                    customAlert("❌ 操作失敗");
                }
            } catch (e) {
                customAlert("❌ 網路錯誤");
            }
        }

        let brightnessTimeout = null;
        function onBrightnessInput(value) {
            document.getElementById('brightness-val').innerText = value;
            if (brightnessTimeout) clearTimeout(brightnessTimeout);
            brightnessTimeout = setTimeout(async () => {
                try {
                    await fetch('/api/brightness', {
                        method: 'POST',
                        headers: API_HEADERS(),
                        body: JSON.stringify({ brightness: parseInt(value) })
                    });
                } catch (e) {}
            }, 300);
        }

        async function updateBatteryConfig() {
            const style = parseInt(document.getElementById('bat-style-select').value);
            const pos = parseInt(document.getElementById('bat-pos-select').value);
            try {
                await fetch('/api/settings/battery', {
                    method: 'POST',
                    headers: API_HEADERS(),
                    body: JSON.stringify({ bat_style: style, bat_pos: pos })
                });
            } catch (e) {
                console.error('Failed to update battery config', e);
            }
        }

        async function updateOpenwrtUrl() {
            const url = document.getElementById('openwrt-url').value.trim();
            const msgEl = document.getElementById('action-openwrt-msg');
            msgEl.innerText = "保存中...";
            try {
                const res = await fetch('/api/settings/openwrt', {
                    method: 'POST',
                    headers: API_HEADERS(),
                    body: JSON.stringify({ url: url })
                });
                if (res.ok) {
                    msgEl.innerText = "✅ 已保存 (若为空则自动恢复默认)";
                    msgEl.style.color = "var(--accent-emerald)";
                    setTimeout(() => loadData(), 1000); // Reload to show the actual saved value
                } else {
                    msgEl.innerText = "❌ 保存失敗";
                    msgEl.style.color = "var(--accent-rose)";
                }
            } catch (e) {
                msgEl.innerText = "❌ 網路錯誤";
                msgEl.style.color = "var(--accent-rose)";
            }
            setTimeout(() => { msgEl.innerText = ""; }, 3000);
        }

        async function updateMqttConfig() {
            const payload = {
                url: document.getElementById('mqtt-url').value.trim(),
                topic: document.getElementById('mqtt-topic').value.trim(),
                user: document.getElementById('mqtt-user').value.trim(),
                pwd: document.getElementById('mqtt-pwd').value.trim()
            };
            const msgEl = document.getElementById('action-mqtt-msg');
            msgEl.innerText = "保存中...";
            try {
                const res = await fetch('/api/settings/mqtt', {
                    method: 'POST',
                    headers: API_HEADERS(),
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    msgEl.innerText = "✅ MQTT 配置已保存";
                    msgEl.style.color = "var(--accent-emerald)";
                } else {
                    msgEl.innerText = "❌ 保存失败";
                    msgEl.style.color = "var(--accent-rose)";
                }
            } catch (e) {
                msgEl.innerText = "❌ 网络错误";
                msgEl.style.color = "var(--accent-rose)";
            }
            setTimeout(() => { msgEl.innerText = ""; }, 3000);
        }

        async function performOTA() {
            const file = document.getElementById('ota-file').files[0];
            if (!file) return customAlert("請選擇固件檔案 (.bin)");

            if (!await customConfirm("確認升級固件？\n升級過程中請勿斷電！")) return;

            const progressContainer = document.getElementById('ota-progress-container');
            const progressBar = document.getElementById('ota-progress-bar');
            const progressText = document.getElementById('ota-progress-text');
            
            progressContainer.style.display = 'block';
            progressText.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.innerText = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/ota', true);
            xhr.setRequestHeader('Authorization', API_HEADERS().Authorization);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    progressText.innerText = percentComplete + '% (上傳中...)';
                    if (percentComplete === 100) {
                        progressText.innerText = '100% (正在刷寫 Flash，請稍候...)';
                    }
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    progressText.innerText = '✅ 升級成功！設備即將重啟';
                    progressBar.style.background = 'var(--accent-emerald)';
                    setTimeout(() => customAlert("✅ 正在升級，設備即將自動重啟..."), 500);
                } else {
                    progressText.innerText = '❌ 升級失敗';
                    progressBar.style.background = 'var(--accent-rose)';
                    customAlert("❌ OTA 升級失敗: " + xhr.statusText);
                }
            };

            xhr.onerror = function() {
                progressText.innerText = '❌ 網路錯誤';
                progressBar.style.background = 'var(--accent-rose)';
                customAlert("❌ OTA 升級失敗，網路錯誤");
            };

            xhr.send(file);
        }

        function triggerAction(url) {
            fetch(url, { headers: API_HEADERS() })
                .then(response => response.json())
                .then(data => {
                    console.log("執行成功:", data);
                })
                .catch(error => {
                    console.error("執行失敗:", error);
                    alert("設備離線或請求失敗！");
                });
        }
    </script>
</body>

</html>
